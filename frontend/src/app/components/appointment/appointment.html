<div class="appointment-page">
  <div class="appointment-header">
    <h1>Zakaži termin</h1>
    <p>Popunite formu i kontaktiraćemo vas u najkraćem roku</p>
  </div>

  <div class="appointment-container">
    @if (successMessage) {
      <div class="success-msg">{{ successMessage }}</div>
    }

    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Ime i prezime</label>
          <input type="text" [(ngModel)]="form.name" name="name" placeholder="Vaše ime" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="vas@email.com" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Telefon</label>
          <input type="text" [(ngModel)]="form.phone" name="phone" 
            placeholder="+381 60 ... ili 06..."
            pattern="(\+\d{9,15}|06\d{7,8})"
            #phoneInput="ngModel" required />
        </div>
        <div class="form-group">
          <label>Željeni datum i vreme</label>
          <input type="datetime-local" [(ngModel)]="form.date" name="date" required />
        </div>
      </div>

      <div class="form-group">
        <label>Opis problema</label>
        <textarea [(ngModel)]="form.description" name="description" placeholder="Opišite problem sa vašim uređajem..." rows="5" required></textarea>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Slanje...' : 'Zakaži termin' }}
      </button>
    </form>
  </div>
</div>
