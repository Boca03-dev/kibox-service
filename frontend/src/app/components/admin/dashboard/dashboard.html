<div class="admin-page">
  <app-admin-sidebar></app-admin-sidebar>

  <div class="admin-content">
    <h1>Dashboard</h1>

    @if (loading) {
      <div class="loading">Učitavanje...</div>
    }

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">✉️</div>
        <div class="stat-info">
          <h3>{{ unreadMessages }}</h3>
          <p>Nepročitane poruke</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-info">
          <h3>{{ pendingAppointments }}</h3>
          <p>Termini na čekanju</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🖥️</div>
        <div class="stat-info">
          <h3>{{ totalConfigurations }}</h3>
          <p>Zahtevi za konfiguracije</p>
        </div>
      </div>
    </div>

    <div class="quick-links">
      <h2>Brzi pristup</h2>
      <div class="links-grid">
        <a routerLink="/admin/messages" class="quick-link-card">
          <span>✉️</span>
          <h3>Poruke</h3>
          <p>Pregledajte sve kontakt poruke</p>
        </a>
        <a routerLink="/admin/appointments" class="quick-link-card">
          <span>📅</span>
          <h3>Termini</h3>
          <p>Upravljajte zakazanim terminima</p>
        </a>
      </div>
    </div>
  </div>
</div>
