<div class="auth-page">
  <div class="auth-card">
    <h2>Registracija</h2>
    <p class="auth-sub">Kreirajte vaš nalog</p>

    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Ime i prezime</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Vaše ime" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="vas@email.com" required />
      </div>
      <div class="form-group">
        <label>Lozinka</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Registrovanje...' : 'Registruj se' }}
      </button>
    </form>

    <p class="auth-link">Već imate nalog? <a routerLink="/login">Prijavite se</a></p>
  </div>
</div>
