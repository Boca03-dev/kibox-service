<div class="auth-page">
  <div class="auth-card">
    <h2>Prijava</h2>
    <p class="auth-sub">Dobrodošli nazad!</p>

    @if (errorMessage) {
      <div class="error-msg">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="vas@email.com" required />
      </div>
      <div class="form-group">
        <label>Lozinka</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Prijavljivanje...' : 'Prijavi se' }}
      </button>
    </form>

    <p class="auth-link">Nemate nalog? <a routerLink="/register">Registrujte se</a></p>
  </div>
</div>
